name: test-teams-notification

on:
  push:
    branches:
      - main

  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/portfolio:latest .

      - name: Push Docker Image to Docker Hub
        run: docker push ${{ secrets.DOCKER_USERNAME }}/portfolio:latest

      - name: Notify Teams - Success
        if: success()
        run: |
          curl -H "Content-Type: application/json" \
          -d '{
            "text": "✅ Docker Image Build & Push Successful

            Repository: '"${{ github.repository }}"'
            Branch: '"${{ github.ref_name }}"'
            Triggered By: '"${{ github.actor }}"'
            Image: '"${{ secrets.DOCKER_USERNAME }}"'/portfolio:latest

            Workflow URL:
            https://github.com/'"${{ github.repository }}"'/actions/runs/'"${{ github.run_id }}"'"
          }' \
          "${{ secrets.TEAMS_WEBHOOK_URL }}"

      - name: Notify Teams - Failure
        if: failure()
        run: |
          curl -H "Content-Type: application/json" \
          -d '{
            "text": "❌ Docker Image Build or Push Failed

            Repository: '"${{ github.repository }}"'
            Branch: '"${{ github.ref_name }}"'
            Triggered By: '"${{ github.actor }}"'

            Workflow URL:
            https://github.com/'"${{ github.repository }}"'/actions/runs/'"${{ github.run_id }}"'"
          }' \
          "${{ secrets.TEAMS_WEBHOOK_URL }}"
