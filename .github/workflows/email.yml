name: test-email

on:
  push:
    branches:
      - main

  workflow_dispatch:

jobs:
  build:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: |
          docker build \
            -t ${{ secrets.DOCKER_USERNAME }}/portfolio:latest \
            .

      - name: Push Docker Image
        run: |
          docker push \
            ${{ secrets.DOCKER_USERNAME }}/portfolio:latest

  send-email-notification:
    name: Notify Stakeholders via Email

    runs-on: ubuntu-latest

    # Wait for build job to complete
    needs: build

    # Run even if build fails or gets cancelled
    if: always()

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine Build Status
        run: |
          if [ "${{ needs.build.result }}" = "success" ]; then
            echo "STATUS=SUCCESS" >> $GITHUB_ENV
            echo "ICON=✅" >> $GITHUB_ENV

          elif [ "${{ needs.build.result }}" = "cancelled" ]; then
            echo "STATUS=CANCELLED" >> $GITHUB_ENV
            echo "ICON=🚫" >> $GITHUB_ENV

          else
            echo "STATUS=FAILED" >> $GITHUB_ENV
            echo "ICON=❌" >> $GITHUB_ENV
          fi

      - name: Extract Commit Details
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%B)

          echo "MERGE_DETAILS<<EOF" >> $GITHUB_ENV
          echo "$COMMIT_MSG" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Send Email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true

          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}

          subject: "${{ env.ICON }} Build ${{ env.STATUS }} - ${{ github.repository }}"

          to: ${{ secrets.EMAIL_TO }}

          from: GitHub Actions CI/CD <${{ secrets.SMTP_USERNAME }}>

          html_body: |
            <h2>${{ env.ICON }} Build ${{
            env.STATUS }}</h2>

            <p>
              The GitHub Actions workflow has completed.
            </p>

            <h3>📦 Build Details</h3>

            <ul>
              <li><strong>Repository:</strong> ${{ github.repository }}</li>
              <li><strong>Branch:</strong> ${{ github.ref_name }}</li>
              <li><strong>Triggered By:</strong> ${{ github.actor }}</li>
              <li><strong>Workflow:</strong> ${{ github.workflow }}</li>
              <li><strong>Build Result:</strong> ${{ needs.build.result }}</li>
              <li><strong>Commit SHA:</strong> ${{ github.sha }}</li>
            </ul>

            <h3>🔀 Latest Commit Details</h3>

            <pre>${{ env.MERGE_DETAILS }}</pre>

            <h3>🔗 Workflow Logs</h3>

            <p>
              <a href="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}">
                View GitHub Actions Run #${{ github.run_number }}
              </a>
            </p>
